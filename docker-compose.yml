services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatapp_user
      POSTGRES_PASSWORD: chatapp_pass
      POSTGRES_DB: chatapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatapp_user -d chatapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://chatapp_user:chatapp_pass@db:5432/chatapp
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv          # anonymous volume — shadows the mounted .venv from Windows
      - uploads_data:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://chatapp_user:chatapp_pass@db:5432/chatapp
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - /app/.venv          # same fix here
      - uploads_data:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A app.core.celery_app worker --loglevel=info --pool=solo

volumes:
  postgres_data:
  uploads_data: